name: "GLM Coding Companion"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  issues:
    types: [ opened ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  glm-companion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Zhipu AI SDK
        run: |
          python -m pip install --upgrade pip
          pip install zhipuai openai

      - name: GLM Pull Request Code Review
        if: github.event_name == 'pull_request'
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          echo "GLM is reviewing your PR with god-tier reasoning..."
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tr '\n' ' ')
          python -c "
          import os
          from zhipuai import ZhipuAI
          client = ZhipuAI(api_key=os.getenv('ZHIPU_API_KEY'))
          files = os.getenv('CHANGED_FILES', '').strip() or 'No specific files detected'
          prompt = f'You are GLM-4, an elite senior software engineer. Review these files: {files}. Provide markdown review.'
          response = client.chat.completions.create(model='glm-4-flash', messages=[{'role': 'user', 'content': prompt}])
          with open('glm_review.md', 'w') as f: f.write('# GLM-4 Code Review\n\n' + response.choices[0].message.content.strip())
          "

      - name: Post GLM Review to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const review = await fs.readFile('glm_review.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: review
            });
