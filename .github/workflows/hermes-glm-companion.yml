# =============================================================================
# hermes-glm-companion.yml  — GLM coding companion (from HERMES.md)
# -----------------------------------------------------------------------------
# SOURCE: ~/HERMES.md  (the embedded "GLM Coding Companion" workflow spec:
#   PR review, issue solution architect, manual code generation).
#
# Upgraded to be genuinely agentic + large:
#   * PR review: real GLM-4 review, posted as a PR comment.
#   * Issue triage: real GLM-4 solution design, posted as an issue comment.
#   * Triage loop: if the issue is labeled agent-task, it can AUTO-HAND to the
#     SDLC examine stage (closing the loop from chat -> autonomous build).
#   * Manual codegen via .glm-request (workflow_dispatch).
#   * All secrets via ${{ secrets.* }}; fails if LLM_API_KEY missing.
# =============================================================================
name: "Hermes ▸ GLM Coding Companion"
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      request:
        description: "Manual code-generation request (used if .glm-request absent)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  glm-companion:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "GLM PR Review"
        if: github.event_name == 'pull_request'
        id: pr_review_diff
        shell: bash
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tr '\n' ' ')
          echo "changed_files=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: "Real LLM: review the PR"
        if: github.event_name == 'pull_request'
        id: pr_review
        uses: ./.github/actions/llm/action.yml
        with:
          system: "Review these changed files. Give: correctness, security, performance, readability, one concrete fix, one witty remark."
          temperature: "0.5"
          max_tokens: "3000"
          prompt: |
            Review these changed files:
            ${{ steps.pr_review_diff.outputs.changed_files }}

      - name: "Post GLM Review"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `# GLM-4 Review\n\n${{ steps.pr_review.outputs.completion }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: "Real LLM: Issue Solution Architect"
        if: github.event_name == 'issues' && github.event.action == 'opened'
        id: issue_solution
        uses: ./.github/actions/llm/action.yml
        with:
          system: "Provide: deep analysis, step-by-step fix plan, code example, final recommendation."
          temperature: "0.4"
          max_tokens: "3000"
          prompt: |
            Issue title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

      - name: "Post GLM Solution + auto-hand to SDLC if agent-task"
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `# GLM-4 Solution\n\n${{ steps.issue_solution.outputs.completion }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            const labels = context.payload.issue.labels.map(l=>l.name);
            if (labels.includes('agent-task')) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'sdlc-examine.yml',
                ref: '${{ github.ref }}',
                inputs: { issue_number: String(context.issue.number), cycle: '0' }
              });
            }

      - name: "Prepare Manual Code Generation Request"
        if: github.event_name == 'workflow_dispatch'
        id: prepare_gen
        shell: bash
        run: |
          REQ="${{ inputs.request }}"
          if [ -z "$REQ" ] && [ -f .glm-request ]; then REQ=$(cat .glm-request); fi
          if [ -z "$REQ" ]; then REQ="no request provided"; fi
          echo "request=$REQ" >> "$GITHUB_OUTPUT"

      - name: "Real LLM: Manual Code Generation"
        if: github.event_name == 'workflow_dispatch'
        id: manual_gen
        uses: ./.github/actions/llm/action.yml
        with:
          system: "Generate production-ready code. Include full code, comments, usage, dependencies."
          temperature: "0.3"
          max_tokens: "3500"
          prompt: |
            ${{ steps.prepare_gen.outputs.request }}

      - name: "Post Manual Code Gen"
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = `# GLM-4 Generated Code\n\n${{ steps.manual_gen.outputs.completion }}`;
            fs.writeFileSync('GLM_GENERATED_CODE.md', body);
