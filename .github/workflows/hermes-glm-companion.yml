# =============================================================================
# hermes-glm-companion.yml  — GLM coding companion (from HERMES.md)
# -----------------------------------------------------------------------------
# SOURCE: ~/HERMES.md  (the embedded "GLM Coding Companion" workflow spec:
#   PR review, issue solution architect, manual code generation).
#
# Upgraded to be genuinely agentic + large:
#   * PR review: real LLM review, via composite action.
#   * Issue triage: real LLM solution design, via composite action.
#   * Triage loop: if the issue is labeled agent-task, it can AUTO-HAND to the
#     SDLC examine stage (closing the loop from chat -> autonomous build).
#   * Manual codegen via .glm-request (workflow_dispatch).
#   * All secrets via ${{ secrets.* }}; uses repository-standard LLM action.
# =============================================================================
name: "Hermes ▸ GLM Coding Companion"
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      request:
        description: "Manual code-generation request (used if .glm-request absent)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  glm-companion:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Calculate Changed Files"
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tr '\n' ' ')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: "GLM PR Review"
        if: github.event_name == 'pull_request'
        id: review
        uses: ./.github/actions/llm/action.yml
        with:
          system: "You are a senior code reviewer."
          temperature: "0.5"
          max_tokens: "3000"
          prompt: |
            Review these changed files: ${{ steps.changed.outputs.files }}
            Give: correctness, security, performance, readability, one concrete fix, one witty remark.

      - name: "Post GLM Review"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COMPLETION: ${{ steps.review.outputs.completion }}
        with:
          script: |
            const body = "# GLM-4 Review\n\n" + process.env.COMPLETION;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: "GLM Issue Solution Architect"
        if: github.event_name == 'issues' && github.event.action == 'opened'
        id: solution
        uses: ./.github/actions/llm/action.yml
        with:
          system: "You are a senior solution architect."
          temperature: "0.4"
          max_tokens: "3000"
          prompt: |
            Issue title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}
            Provide: deep analysis, step-by-step fix plan, code example, final recommendation.

      - name: "Post GLM Solution + auto-hand to SDLC if agent-task"
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        env:
          COMPLETION: ${{ steps.solution.outputs.completion }}
        with:
          script: |
            const body = "# GLM-4 Solution\n\n" + process.env.COMPLETION;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            const labels = context.payload.issue.labels.map(l=>l.name);
            if (labels.includes('agent-task')) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'sdlc-examine.yml',
                ref: context.ref,
                inputs: { issue_number: String(context.issue.number), cycle: '0' }
              });
            }

      - name: "Prepare Gen Prompt"
        if: github.event_name == 'workflow_dispatch'
        id: prep
        run: |
          REQ="${{ inputs.request }}"
          if [ -z "$REQ" ] && [ -f .glm-request ]; then REQ=$(cat .glm-request); fi
          if [ -z "$REQ" ]; then echo "no request provided"; exit 0; fi
          echo "request=$REQ" >> "$GITHUB_OUTPUT"

      - name: "GLM Manual Code Generation"
        if: github.event_name == 'workflow_dispatch' && steps.prep.outputs.request != ''
        id: gen
        uses: ./.github/actions/llm/action.yml
        with:
          system: "You are a senior software engineer."
          temperature: "0.3"
          max_tokens: "3500"
          prompt: |
            Generate production-ready code for:
            ${{ steps.prep.outputs.request }}
            Include full code, comments, usage, dependencies.

      - name: "Save Generated Code"
        if: github.event_name == 'workflow_dispatch' && steps.gen.outputs.completion != ''
        uses: actions/github-script@v7
        env:
          COMPLETION: ${{ steps.gen.outputs.completion }}
        with:
          script: |
            const fs = require('fs');
            const content = "# GLM-4 Generated Code\n\n" + process.env.COMPLETION;
            fs.writeFileSync('GLM_GENERATED_CODE.md', content);
